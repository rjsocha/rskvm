name: release

on:
  push:
    tags:
      # rskvm versions are 14-digit timestamps (YYYYMMDDHHMMSS), not semver -
      # _RSKVM_VERSION is compared numerically by `me:update`.
      - "[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate rskvm (version from tag)
        run: RSKVM_VERSION="${GITHUB_REF_NAME}" ./generate

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          # Ship only the ready-to-run script - no README, no checksums.
          files: rskvm
          # Tags are not semver; force this release to be "latest" so the
          # releases/latest/download/rskvm install URL resolves deterministically.
          make_latest: "true"
